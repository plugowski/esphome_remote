substitutions:
  BOARD: "esp32dev"
  DEVICE_NAME: "oled-remote"
  FRIENDLY_NAME: "OLED Remote"
  API_KEY: "8s07kGR8NLaKSRpxpbClUWh9GvY7Afh8qHc4DkyKe4w="
  PIN_WAKE: "0"
  PIN_I2C_SDA: "27"
  PIN_I2C_SCL: "25"

packages:
  menu:        !include packages/menu.yaml
  ac:          !include packages/mode_ac.yaml
  lights:      !include packages/mode_lights.yaml
  covers:      !include packages/mode_covers.yaml
  automations: !include packages/mode_automations.yaml
  settings:    !include packages/mode_settings.yaml
  buttons:     !include packages/buttons.yaml
  layout:      !include packages/layouts/layout_v2.yaml

# ── fonts shared across all modes ────────────────────────────────────────────
font:
  - file: "fonts/arial_bold.ttf"
    id: font_base
    size: 14
    glyphs: "0123456789.%ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz _:"

  - file: "fonts/arial_bold.ttf"
    id: font_small
    size: 10
    glyphs:
      - "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz1234567890.%- <>"
      - "\u25b2"  # ▲ (list up)
      - "\u25bc"  # ▼ (list down)

  - file: "fonts/arial_bold.ttf"
    id: font_bigger
    size: 28
    glyphs: "ADEGHILMOTUWRY0123456789%"

  - file: "fonts/arial_bold.ttf"
    id: font_big
    size: 40
    glyphs: "ADEGHILMOTUWRY0123456789%"

# ── core esphome config ───────────────────────────────────────────────────────
esphome:
  name: ${DEVICE_NAME}
  friendly_name: ${FRIENDLY_NAME}
  min_version: 2024.11.0
  name_add_mac_suffix: false
  includes:
    - src/menu_entities.h
    - src/quick_action_entities.h
    - src/remote_core.h
    - src/wake_utils.h
    - src/display_utils.h
    - src/menu_controller.h
    - src/ac_entities.h
    - src/ac_controller.h
    - src/light_entities.h
    - src/lights_controller.h
    - src/cover_entities.h
    - src/cover_controller.h
    - src/automation_entities.h
    - src/automation_controller.h
    - src/settings_controller.h
  on_boot:
    - priority: 700
      then:
        - lambda: 'id(is_timer_wake) = is_timer_wakeup();'
        - if:
            condition: { lambda: 'return !id(is_timer_wake);' }
            then:
              - output.turn_on: oled_power
              - delay: 10ms
    - priority: 250
      then:
        - if:
            condition: { lambda: 'return !id(is_timer_wake);' }
            then:
              - lambda: |-
                  if (id(app_mode) >= MENU_LIST_COUNT) id(app_mode) = 0;
                  RemoteCore::resetIdleTimer(id(last_active));
                  id(is_booting) = true;
    - priority: -200        # runs after all sensors/components are initialised
      then:
        - if:
            condition: { lambda: 'return id(is_timer_wake);' }
            then:
              # Timer wake: read battery, wait for WiFi + API to publish, sleep again
              - component.update: battery_raw
              - wait_until:
                  condition:
                    api.connected:
                  timeout: 30s
              - delay: 2s   # ensure the value is flushed to HA
              - deep_sleep.enter:
                  sleep_duration: !lambda 'return (uint32_t)id(battery_interval_mins) * 60000;'
            else:
              # Normal wake: wait for WiFi, then wait for entity states
              - wait_until:
                  condition:
                    wifi.connected:
                  timeout: 10s
              - if:
                  condition:
                    not:
                      wifi.connected:
                  then:
                    - lambda: 'id(conn_status) = 1; id(is_booting) = false;'
                  else:
                    - wait_until:
                        condition:
                          lambda: 'return !id(is_booting);'
                        timeout: 10s
                    - if:
                        condition:
                          lambda: 'return id(is_booting) && id(conn_status) != 0;'
                        then:
                          - lambda: 'id(conn_status) = 2;'
                    - lambda: 'id(is_booting) = false;'

esp32:
  board: ${BOARD}
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT
  on_connect:
    - if:
        condition: { lambda: 'return id(conn_status) == 1;' }
        then:
          - lambda: 'id(conn_status) = 0;'
  on_disconnect:
    - lambda: 'id(conn_status) = 1;'

api:
  reboot_timeout: 0s
  encryption:
    key: ${API_KEY}
  on_client_connected:
    - lambda: 'id(conn_status) = 0;'
  on_client_disconnected:
    - if:
        condition:
          wifi.connected:
        then:
          - lambda: 'id(conn_status) = 2;'

ota:
  - platform: esphome

logger:

output:
  - platform: gpio
    pin: 15
    id: oled_power

deep_sleep:
  id: go_sleep
  wakeup_pin:
    number: ${PIN_WAKE}
    allow_other_uses: true
  wakeup_pin_mode: INVERT_WAKEUP

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

# ── shared globals ────────────────────────────────────────────────────────────
globals:
  - id: app_mode          # 0 = AC  |  1 = Lights  |  2 = Covers  |  3 = Automations
    type: int
    initial_value: '0'
    restore_value: true

  - id: menu_active
    type: bool
    initial_value: 'false'

  - id: menu_index
    type: int
    initial_value: '0'

  - id: debounce_active
    type: bool
    initial_value: 'false'

  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

  - id: updated_ui
    type: bool
    initial_value: 'true'

  - id: is_booting
    type: bool
    initial_value: 'true'

  - id: is_shutting_down
    type: bool
    initial_value: 'false'

  - id: is_timer_wake      # true when woken by RTC timer (battery check only)
    type: bool
    initial_value: 'false'

  - id: conn_status         # 0=ok  1=no-wifi  2=no-ha  3=entities-missing
    type: int
    initial_value: '0'


# ── core scripts ──────────────────────────────────────────────────────────────
script:

  - id: turn_off
    mode: single
    then:
      - lambda: 'id(is_shutting_down) = true; RemoteCore::drawPowerOff(id(oled_display), id(font_base));'
      - delay: 1s
      - lambda: |-
          id(oled_display)->clear();
          id(oled_display)->display();
      - delay: 500ms
      - output.turn_off: oled_power
      - delay: 5ms
      - deep_sleep.enter:
          sleep_duration: !lambda 'return (uint32_t)id(battery_interval_mins) * 60000;'

  - id: boot_screen
    then:
      - lambda: 'RemoteCore::drawBoot(id(oled_display), id(menu_icon_big), id(font_small));'

  # dispatches to the active mode's update/draw on every interval tick
  - id: main_update
    then:
      - if:
          condition: { lambda: 'return !id(is_shutting_down);' }
          then:
            - if:
                condition: { lambda: 'return id(is_booting);' }
                then: [ script.execute: boot_screen ]
                else:
                  - if:
                      condition: { lambda: 'return id(conn_status) != 0;' }
                      then:
                        - lambda: 'RemoteCore::drawConnError(id(oled_display), id(font_base), id(font_small), id(conn_status));'
                      else:
                        - if:
                            condition: { lambda: 'return id(menu_active);' }
                            then: [ script.execute: menu_draw ]
                            else:
                              - if:
                                  condition: { lambda: 'return id(app_mode) == APP_AC;' }
                                  then: [ script.execute: ac_update ]
                              - if:
                                  condition: { lambda: 'return id(app_mode) == APP_LIGHTS;' }
                                  then: [ script.execute: lights_update ]
                              - if:
                                  condition: { lambda: 'return id(app_mode) == APP_COVERS;' }
                                  then: [ script.execute: covers_update ]
                              - if:
                                  condition: { lambda: 'return id(app_mode) == APP_AUTOMATIONS;' }
                                  then: [ script.execute: automations_update ]
                              - if:
                                  condition: { lambda: 'return id(app_mode) == APP_SETTINGS;' }
                                  then: [ script.execute: settings_update ]

# ── main loop ─────────────────────────────────────────────────────────────────
interval:
  - interval: 500ms
    then:
      - if:
          condition: { lambda: 'return !id(is_timer_wake);' }
          then:
            - if:
                condition:
                  lambda: 'return RemoteCore::isIdle(id(last_active), id(sleep_timeout_mins) * 60);'
                then: [ script.execute: turn_off ]
                else: [ script.execute: main_update ]
