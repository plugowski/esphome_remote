            then: [ script.execute: covers_btn_pos_down ]
        - if:
            condition: { lambda: 'return !id(menu_active) && id(app_mode) == APP_AUTOMATIONS;' }
            then: [ script.execute: automations_btn_next ]

  # ── TEMP ↓ secondary (18) — same actions as pin 19 ───────────────────────
  - platform: gpio
    pin:
