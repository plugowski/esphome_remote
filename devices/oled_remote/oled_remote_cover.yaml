substitutions:
  PIN_WAKE: "0"
  PIN_I2C_SDA: "27"
  PIN_I2C_SCL: "25"
  PIN_OLED_EN: "15"
  PIN_BAT_ADC: "32"
  PIN_BTN_STOP: "5"
  PIN_BTN_SELECT: "14"
  PIN_BTN_PRESET: "26"
  PIN_BTN_OPEN: "33"
  PIN_BTN_CLOSE: "22"
  PIN_BTN_POS_UP: "23"
  PIN_BTN_POS_UP_2: "17"
  PIN_BTN_POS_DOWN: "19"
  PIN_BTN_POS_DOWN_2: "18"

api:
  reboot_timeout: 0s
  encryption:
    key: "<UPDATE_YOUR_KEY>"

ota:
  - platform: esphome

font:
  - file: "fonts/arial_bold.ttf"
    id: basic
    size: 14
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":"]
  - file: "fonts/arial_bold.ttf"
    id: small
    size: 10
    glyphs: [ADEFGHILMNOTUWVRY1234567890., " "]
  - file: "fonts/arial_bold.ttf"
    id: big
    size: 40
    glyphs: ["0123456789%"]
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 400
    id: symbols
    size: 24
    glyphs: [
      "\ue88b", # loading
    ]
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 700
    id: symbols_big
    size: 36
    glyphs: [
      "\uec1d", # curtains_closed
      "\uec1e", # curtains (open)
      "\ue88b", # loading
    ]

esphome:
  name: cover-remote-v1
  friendly_name: Cover Controller
  min_version: 2024.11.0
  name_add_mac_suffix: false
  on_boot:
    - priority: 700
      then:
        - output.turn_on: oled_power
        - delay: 10ms

    - priority: 400
      then:
        - script.execute: update_battery

    - priority: 250
      then:
        - lambda: |-
            id(last_active) = millis() / 1000;
  includes:
    - cover_entities.h
    - display_utils.h

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT

logger:

deep_sleep:
  id: go_sleep
  sleep_duration: 360min # update battery every 6h
  wakeup_pin:
    number: ${PIN_WAKE}
    allow_other_uses: true
  wakeup_pin_mode: INVERT_WAKEUP

output:
  - platform: gpio
    pin: ${PIN_OLED_EN}
    id: oled_power

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

globals:

  - id: debounce_active
    type: bool
    initial_value: 'false'

  - id: contrast
    type: int
    initial_value: '5'
    restore_value: True

  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_battery_update
    type: uint32_t
    initial_value: '0'

  - id: updated_ui
    type: bool
    initial_value: 'true'

  - id: is_booting
    type: bool
    initial_value: 'false'

  - id: selected_cover_index
    type: int
    initial_value: '0'
    restore_value: True
  - id: selected_cover
    type: std::string
    initial_value: '"cover.living_room_curtain"'
    restore_value: True
  - id: selected_cover_name
    type: std::string
    initial_value: '"Living"'
    restore_value: True

  - id: current_cover_state
    type: std::string
    initial_value: '"unknown"'

  - id: current_position
    type: int
    initial_value: '-1'

  - id: selected_position
    type: int
    initial_value: '-1'

sensor:
  - platform: homeassistant
    id: living_room_curtain_pos
    entity_id: cover.living_room_curtain
    attribute: current_position
    on_value:
      then:
        - script.execute: set_current_states

  - platform: homeassistant
    id: bedroom_curtain_pos
    entity_id: cover.bedroom_curtain
    attribute: current_position
    on_value:
      then:
        - script.execute: set_current_states

  - platform: adc
    pin: ${PIN_BAT_ADC}
    id: battery_adc
    attenuation: 11db
    update_interval: never
    filters:
      - multiply: 1.68

  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }
      return id(battery_adc).state;

  - platform: template
    id: battery_percent
    name: "Battery"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }

      float v = id(battery_adc).state;
      static float v_avg = 0;

      const float V_MIN = 3.30;
      const float V_MAX = 4.20;
      const float GAMMA = 2.2;

      if (isnan(v) || v < 2.5 || v > 4.5) {
        return NAN;
      }

      v_avg = (v_avg == 0) ? v : (v_avg * 0.8f + v * 0.2f);
      v = v_avg;

      if (v <= V_MIN) return 0;
      if (v >= V_MAX) return 100;

      float x = (v - V_MIN) / (V_MAX - V_MIN);
      float pct = powf(x, GAMMA) * 100.0f;

      return (int)roundf(pct);

text_sensor:
  - platform: homeassistant
    id: living_room_curtain_state
    entity_id: cover.living_room_curtain
    on_value:
      then:
        - script.execute: set_current_states

  - platform: homeassistant
    id: bedroom_curtain_state
    entity_id: cover.bedroom_curtain
    on_value:
      then:
        - script.execute: set_current_states

binary_sensor:

  - platform: gpio
    pin:
      allow_other_uses: true
      number: ${PIN_WAKE}
      mode:
        input: True
        pullup: True
    name: "On/Off Remote"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: turn_off

  - platform: gpio
    pin:
      number: ${PIN_BTN_STOP}
      mode:
        input: True
        pullup: True
    name: "Stop Cover"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: send_stop

  - platform: gpio
    pin:
      number: ${PIN_BTN_SELECT}
      mode:
        input: True
        pullup: True
    name: "Select Cover"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            id(selected_cover_index) += 1;
            if (id(selected_cover_index) >= COVER_LIST_COUNT) id(selected_cover_index) = 0;
        - script.execute: update_selected_cover

  - platform: gpio
    pin:
      number: ${PIN_BTN_PRESET}
      mode:
        input: True
        pullup: True
    name: "Cover Preset"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            static const int presets[] = {0, 25, 50, 75, 100};
            static const int preset_count = 5;
            int cur = id(selected_position);
            // find next preset above current
            int next = presets[0];
            for (int i = 0; i < preset_count; i++) {
              if (presets[i] > cur) {
                next = presets[i];
                break;
              }
            }
            if (cur >= presets[preset_count - 1]) next = presets[0];
            id(selected_position) = next;
            id(updated_ui) = true;
        - script.execute: update_display
        - script.execute: await

  - platform: gpio
    pin:
      number: ${PIN_BTN_OPEN}
      mode:
        input: True
        pullup: True
    name: "Open Cover"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: send_open

  - platform: gpio
    pin:
      number: ${PIN_BTN_CLOSE}
      mode:
        input: True
        pullup: True
    name: "Close Cover"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: send_close

  - platform: gpio
    pin:
      number: ${PIN_BTN_POS_UP}
      mode:
        input: True
        pullup: True
    name: "Position Up"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            int pos = id(selected_position);
            if (pos < 0) pos = id(current_position);
            if (pos < 0) pos = 0;
            pos += 5;
            if (pos > 100) pos = 100;
            id(selected_position) = pos;
            id(updated_ui) = true;
        - script.execute: update_display
        - script.execute: await

  - platform: gpio
    pin:
      number: ${PIN_BTN_POS_UP_2}
      mode:
        input: True
        pullup: True
    name: "Position Up 2"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            int pos = id(selected_position);
            if (pos < 0) pos = id(current_position);
            if (pos < 0) pos = 0;
            pos += 5;
            if (pos > 100) pos = 100;
            id(selected_position) = pos;
            id(updated_ui) = true;
        - script.execute: update_display
        - script.execute: await

  - platform: gpio
    pin:
      number: ${PIN_BTN_POS_DOWN}
      mode:
        input: True
        pullup: True
    name: "Position Down"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            int pos = id(selected_position);
            if (pos < 0) pos = id(current_position);
            if (pos < 0) pos = 0;
            pos -= 5;
            if (pos < 0) pos = 0;
            id(selected_position) = pos;
            id(updated_ui) = true;
        - script.execute: update_display
        - script.execute: await

  - platform: gpio
    pin:
      number: ${PIN_BTN_POS_DOWN_2}
      mode:
        input: True
        pullup: True
    name: "Position Down 2"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            int pos = id(selected_position);
            if (pos < 0) pos = id(current_position);
            if (pos < 0) pos = 0;
            pos -= 5;
            if (pos < 0) pos = 0;
            id(selected_position) = pos;
            id(updated_ui) = true;
        - script.execute: update_display
        - script.execute: await

script:

  - id: turn_off
    mode: single
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 32, id(basic), COLOR_ON, display::TextAlign::CENTER, "POWER OFF");
          it->display();
      - delay: 1s
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->display();
      - delay: 500ms
      - output.turn_off: oled_power
      - delay: 5ms
      - deep_sleep.enter: go_sleep

  - id: boot_screen
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 24, id(symbols), COLOR_ON, display::TextAlign::CENTER, "\ue88b");
          it->print(64, 50, id(small), COLOR_ON, display::TextAlign::CENTER, "LOADING");
          it->display();

          id(is_booting) = true;

  - id: update_battery
    mode: single
    then:
      - logger.log:
          level: DEBUG
          format: "Updating battery state"
      - component.update: battery_adc
      - delay: 50ms
      - lambda: |-
          ESP_LOGD("battery", "ADC has state: %d value: %.3f",
            id(battery_adc).has_state(),
            id(battery_adc).has_state() ? id(battery_adc).state : -1.0);
      - component.update: battery_voltage
      - component.update: battery_percent
      - lambda: |-
          id(last_battery_update) = millis();

  - id: update_display
    then:
      - if:
          condition:
              lambda: 'return id(updated_ui) == true;'
          then:
            - logger.log:
                format: "Screen Reloaded"
                level: DEBUG
            - lambda: |-
                auto it = id(oled_display);
                it->clear();

                auto state = id(current_cover_state);
                int pos = id(current_position);
                int sel_pos = id(selected_position);

                // Use selected_position if debounce is active
                int display_pos = (id(debounce_active) && sel_pos >= 0) ? sel_pos : pos;

                auto cover_name = id(selected_cover_name);
                for (auto & c : cover_name) c = toupper(c);

                bool fully_closed = (state == "closed" || display_pos == 0);
                bool fully_open   = (state == "open"   || display_pos == 100);
                bool is_moving    = (state == "opening" || state == "closing");

                if (display_pos < 0) {
                  // Unknown — show loading icon
                  it->print(64, 18, id(symbols_big), COLOR_ON, display::TextAlign::CENTER, "\ue88b");
                } else if (fully_closed) {
                  it->print(64, 18, id(symbols_big), COLOR_ON, display::TextAlign::CENTER, "\uec1d");
                } else if (fully_open) {
                  it->print(64, 18, id(symbols_big), COLOR_ON, display::TextAlign::CENTER, "\uec1e");
                } else {
                  // Progress bar — 3px height at top
                  int bar_w = (int)(128 * display_pos / 100);
                  it->filled_rectangle(0, 0, bar_w, 3);

                  // Big percentage text
                  char pct_str[8];
                  snprintf(pct_str, sizeof(pct_str), "%d%%", display_pos);
                  it->print(64, 17, id(big), COLOR_ON, display::TextAlign::CENTER, pct_str);

                  // Moving state text
                  if (is_moving) {
                    std::string moving_str = state;
                    for (auto & c : moving_str) c = toupper(c);
                    it->print(64, 35, id(small), COLOR_ON, display::TextAlign::CENTER, moving_str.c_str());
                  }
                }

                // Bottom bar — always present
                it->rectangle(0, 38, 128, 1);
                it->print(64, 47, id(basic), COLOR_ON, display::TextAlign::CENTER, cover_name.c_str());
                draw_bottom_menu(it, id(small), "CLOSE", "STOP", "OPEN");

                it->display();
                id(updated_ui) = false;

  - id: set_current_states
    mode: restart
    then:
      lambda: |-
        int idx = id(selected_cover_index);
        if (idx >= 0 && idx < COVER_LIST_COUNT) {
          // state
          const char* state_id = COVER_LIST[idx].state_sensor_id;
          if (strcmp(state_id, "living_room_curtain_state") == 0) {
            id(current_cover_state) = id(living_room_curtain_state).state;
          } else if (strcmp(state_id, "bedroom_curtain_state") == 0) {
            id(current_cover_state) = id(bedroom_curtain_state).state;
          }

          // position
          const char* pos_id = COVER_LIST[idx].position_sensor_id;
          if (strcmp(pos_id, "living_room_curtain_pos") == 0) {
            if (id(living_room_curtain_pos).has_state()) {
              id(current_position) = (int)id(living_room_curtain_pos).state;
            }
          } else if (strcmp(pos_id, "bedroom_curtain_pos") == 0) {
            if (id(bedroom_curtain_pos).has_state()) {
              id(current_position) = (int)id(bedroom_curtain_pos).state;
            }
          }

          // Sync selected_position from HA when not debouncing
          if (!id(debounce_active) && id(current_position) >= 0) {
            id(selected_position) = id(current_position);
          }
        }

        id(updated_ui) = true;

  - id: update_selected_cover
    then:
      - lambda: |-
          int idx = id(selected_cover_index);
          if (idx >= 0 && idx < COVER_LIST_COUNT) {
            id(selected_cover) = COVER_LIST[idx].entity_id;
            id(selected_cover_name) = COVER_LIST[idx].name;
          }
          id(current_position) = -1;
          id(selected_position) = -1;
          id(current_cover_state) = "unknown";
          id(updated_ui) = true;
      - script.execute: update_display

  - id: send_open
    mode: single
    then:
      - logger.log:
          format: "Open cover: %s"
          args: [ 'id(selected_cover).c_str()' ]
          level: DEBUG
      - homeassistant.service:
          service: cover.open_cover
          data:
            entity_id: !lambda 'return id(selected_cover);'

  - id: send_close
    mode: single
    then:
      - logger.log:
          format: "Close cover: %s"
          args: [ 'id(selected_cover).c_str()' ]
          level: DEBUG
      - homeassistant.service:
          service: cover.close_cover
          data:
            entity_id: !lambda 'return id(selected_cover);'

  - id: send_stop
    mode: single
    then:
      - logger.log:
          format: "Stop cover: %s"
          args: [ 'id(selected_cover).c_str()' ]
          level: DEBUG
      - homeassistant.service:
          service: cover.stop_cover
          data:
            entity_id: !lambda 'return id(selected_cover);'

  - id: send_set_position
    mode: single
    then:
      - logger.log:
          format: "Set cover position: %s -> %d"
          args: [ 'id(selected_cover).c_str()', 'id(selected_position)' ]
          level: DEBUG
      - homeassistant.service:
          service: cover.set_cover_position
          data:
            entity_id: !lambda 'return id(selected_cover);'
            position: !lambda 'return id(selected_position);'

  - id: update_cover
    then:
      - if:
          condition:
              lambda: 'return id(debounce_active) == false && id(selected_position) >= 0 && id(selected_position) != id(current_position);'
          then:
            - script.execute: send_set_position
      - script.execute: set_current_states
      - script.execute: update_display

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;

  - id: await
    mode: restart
    then:
      - lambda: |-
          id(debounce_active) = true;
      - delay: 1s
      - lambda: |-
          id(debounce_active) = false;

interval:
  - interval: 500ms
    then:
      - if:
          condition:
              lambda: 'return (millis() / 1000) - id(last_active) >= 120;' # 2 minutes
          then:
            - script.execute: turn_off
          else:
            - if:
                condition:
                    lambda: 'return id(current_cover_state) == "unknown";'
                then:
                  - script.execute: boot_screen
                else:
                  - script.execute: update_cover
